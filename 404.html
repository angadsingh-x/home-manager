<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/home-manager/icon.svg" />
    <link rel="apple-touch-icon" href="/home-manager/apple-touch-icon.png" />
    <link rel="manifest" href="/home-manager/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Home" />
    <title>Home Manager</title>
    <script>
      // Apply persisted theme before React mounts to avoid a flash of light theme.
      (function () {
        try {
          var t = localStorage.getItem('hm.theme');
          var dark = t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/home-manager/assets/index-Cqj-qHtQ.js"></script>
    <link rel="stylesheet" crossorigin href="/home-manager/assets/index-emr9dqeK.css">
  </head>

    <div id="root"></div>
  </body>
</html>
